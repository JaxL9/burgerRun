name: Build Burger Run APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- NODE ----------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------- INSTALL ----------------
      - name: Install dependencies
        run: npm install

      # ---------------- FORCE EXPO INSTALL ----------------
      - name: Install Expo properly
        run: npx expo install expo react react-native

      # ---------------- CLEAN ANDROID ----------------
      - name: Clean old Android build
        run: rm -rf android

      # ---------------- PREBUILD ----------------
      - name: Expo Prebuild (stable)
        run: npx expo prebuild --platform android --clean --no-install

      # ---------------- JAVA ----------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- BUILD APK ----------------
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # ---------------- UPLOAD APK ----------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: burger-run-apk
          path: android/app/build/outputs/apk/release/*.apk
